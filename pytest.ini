[pytest]
addopts = -v -n 1 --reruns 2 --reruns-delay 5 --alluredir=allure-results --html=report.html --self-contained-html
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = logs/pytest.log
log_file_level = DEBUG
markers =
    ui: UI automation tests
    api: API automation tests
    mcp: MCP AI-assisted tests